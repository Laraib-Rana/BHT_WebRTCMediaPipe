<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Media Pipe & Filter Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; min-height: 100vh; display: flex; flex-direction: column; }
        .video-card { background-color: #121620; border: 1px solid rgba(255, 255, 255, 0.08); overflow: hidden; }
        video, canvas { width: 100%; height: auto; border-radius: 4px; background: #000; display: block; }
        #raw-video { transform: scaleX(-1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark border-bottom border-secondary bg-dark px-3 py-2">
        <span class="navbar-brand mb-0 h1 fw-bold text-info">🎛️ WebRTC Media Processing Pipe</span>
        <span class="badge bg-outline-info font-monospace" id="status-tag">Engine Ready</span>
    </nav>

    <div class="container my-auto py-4">
        <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card video-card p-3 shadow-sm text-white">
                    <h6 class="fw-bold text-muted mb-2 text-uppercase small">WebRTC Hardware Feed</h6>
                    <video id="raw-video" autoplay playsinline muted></video>
                    <div class="mt-3">
                        <button id="btn-camera" class="btn btn-primary btn-sm w-100 fw-bold">🔌 Request Camera Permissions</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card video-card p-3 shadow-lg text-white">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="fw-bold text-info mb-0 text-uppercase small">Processed Custom Matrix Pipeline</h6>
                        <span id="recording-indicator" class="badge bg-danger d-none animate-pulse">🔴 RECORDING CLIP</span>
                    </div>
                    
                    <canvas id="output-canvas"></canvas>

                    <div class="row mt-3 g-2">
                        <div class="col-md-6">
                            <label class="form-label small text-muted mb-1 fw-bold">Active Image Algorithm Matrix</label>
                            <select id="filter-select" class="form-select form-select-sm bg-dark text-white border-secondary">
                                <option value="none">Normal (Pass-Through Matrix)</option>
                                <option value="grayscale">High-Contrast Grayscale</option>
                                <option value="invert">Color Spectrum Inversion</option>
                                <option value="pixelate">Retro 8-Bit Pixelation</option>
                                <option value="cyberpunk">Neon Cyberpunk Edge Matrix</option>
                            </select>
                        </div>
                        
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1 fw-bold">AR Mask Layer</label>
                            <div class="form-check form-switch pt-1">
                                <input class="form-check-input" type="checkbox" id="toggle-ar-mask">
                                <label class="form-check-label small" for="toggle-ar-mask">Cyber Visor</label>
                            </div>
                        </div>

                        <div class="col-md-3 d-flex align-items-end">
                            <button id="btn-record" class="btn btn-warning btn-sm w-100 fw-bold" disabled>📹 Record Clip</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="media_pipe.js"></script>
</body>
</html>
